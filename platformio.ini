; ============================================================
; Distributed Temperature Monitoring System
; ESP32-C6 | ESP-IDF 5.5.x | PlatformIO
; Flash: 8 MB  |  Partition table: partitions.csv
; ============================================================

[platformio]
default_envs = gateway

; --- Common settings for all ESP32-C6 nodes ---
[env_common]
platform  = espressif32
board     = esp32-c6-devkitc-1
framework = espidf
board_upload.speed        = 460800
monitor_speed             = 115200
upload_port               = /dev/ttyACM0
monitor_port              = /dev/ttyACM0
; 8 MB flash + custom partition table
board_build.flash_size    = 8MB
board_build.flash_mode    = qio
board_build.partitions    = partitions.csv
build_flags =
    -DCORE_DEBUG_LEVEL=3

; ────────────────────────────────────────────────────────────
; Node Top: 4x MAX31855 + LCD 1.47" + ESP-NOW TX
; Selects src/node_top/main.cpp via CMakeLists.txt
; ────────────────────────────────────────────────────────────
[env:node_top]
platform  = ${env_common.platform}
board     = ${env_common.board}
framework = ${env_common.framework}
board_upload.speed     = ${env_common.board_upload.speed}
monitor_speed          = ${env_common.monitor_speed}
upload_port            = ${env_common.upload_port}
monitor_port           = ${env_common.monitor_port}
board_build.flash_size = ${env_common.board_build.flash_size}
board_build.flash_mode = ${env_common.board_build.flash_mode}
board_build.partitions = ${env_common.board_build.partitions}
build_flags            = ${env_common.build_flags}
board_build.cmake_extra_args = -DNODE_TARGET=node_top

; ────────────────────────────────────────────────────────────
; Node Bottom: 1x MAX31855 + LCD 1.47" + ESP-NOW TX
; Selects src/node_bottom/main.cpp via CMakeLists.txt
; ────────────────────────────────────────────────────────────
[env:node_bottom]
platform  = ${env_common.platform}
board     = ${env_common.board}
framework = ${env_common.framework}
board_upload.speed     = ${env_common.board_upload.speed}
monitor_speed          = ${env_common.monitor_speed}
upload_port            = ${env_common.upload_port}
monitor_port           = ${env_common.monitor_port}
board_build.flash_size = ${env_common.board_build.flash_size}
board_build.flash_mode = ${env_common.board_build.flash_mode}
board_build.partitions = ${env_common.board_build.partitions}
build_flags            = ${env_common.build_flags}
board_build.cmake_extra_args = -DNODE_TARGET=node_bottom

; ────────────────────────────────────────────────────────────
; Gateway: ESP-NOW RX → Serial JSON output
; Selects src/gateway/main.cpp via CMakeLists.txt
; ────────────────────────────────────────────────────────────
[env:gateway]
platform  = ${env_common.platform}
board     = ${env_common.board}
framework = ${env_common.framework}
board_upload.speed     = ${env_common.board_upload.speed}
monitor_speed          = ${env_common.monitor_speed}
upload_port            = ${env_common.upload_port}
monitor_port           = ${env_common.monitor_port}
board_build.flash_size = ${env_common.board_build.flash_size}
board_build.flash_mode = ${env_common.board_build.flash_mode}
board_build.partitions = ${env_common.board_build.partitions}
build_flags            = ${env_common.build_flags}
board_build.cmake_extra_args = -DNODE_TARGET=gateway
