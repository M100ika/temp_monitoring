[env:esp32c6_arduino]
platform = espressif32
board = esp32c6_lcd147
framework = arduino
board_upload.speed = 460800
monitor_speed = 115200
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

; LovyanGFX из реестра библиотек PlatformIO
lib_deps =
    lovyan03/LovyanGFX @ ^1.1.16

; Используем bridge-скрипт для C6 (platformio-build-esp32c6.py)
; который делегирует к framework-arduinoespressif32-libs/esp32c6/
board_build.arduino.memory_type = qio_qspi
build_flags =
    -DCORE_DEBUG_LEVEL=0
